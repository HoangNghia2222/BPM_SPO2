<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Monitor - ERa IoT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            background: transparent;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .health-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* Hiệu ứng nhịp tim đập */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        .heart-icon {
            color: #ef4444;
            animation: heartbeat 1.2s infinite ease-in-out;
        }

        .metric-container {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
        }

        .metric-container:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .value-display {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1;
            color: #1e293b;
        }

        .unit {
            font-size: 1rem;
            color: #64748b;
            font-weight: 600;
            margin-left: 4px;
        }

        /* Thanh tiến trình SpO2 */
        .progress-ring {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: conic-gradient(#3b82f6 var(--p), #e2e8f0 0);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .progress-ring::before {
            content: "";
            position: absolute;
            width: 42px;
            height: 42px;
            background: #f8fafc;
            border-radius: 50%;
        }

        .progress-ring i {
            position: relative;
            z-index: 1;
            color: #3b82f6;
        }

        .status-tag {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 100px;
            text-transform: uppercase;
        }

        /* Giao diện hiển thị Loa */
        .speaker-status {
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .state-inactive { color: #cbd5e1; } /* Xám khi không hoạt động */
        .state-off-active { color: #ef4444; text-shadow: 0 0 8px rgba(239, 68, 68, 0.3); } /* Đỏ khi OFF */
        .state-on-active { color: #22c55e; text-shadow: 0 0 8px rgba(34, 197, 94, 0.3); } /* Xanh khi ON */

    </style>
</head>
<body>

    <div class="health-card">
        <!-- Header -->
        <div class="flex justify-between items-center mb-5">
            <h2 class="text-lg font-bold text-slate-800">Theo dõi sức khỏe</h2>
            <div class="status-tag bg-green-100 text-green-600">Trực tuyến</div>
        </div>

        <!-- BPM Section -->
        <div class="metric-container">
            <div class="w-12 h-12 bg-red-50 rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-heart-pulse heart-icon text-xl"></i>
            </div>
            <div class="flex-1">
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nhịp tim (BPM)</div>
                <div class="value-display">
                    <span id="bpm-val">--</span><span class="unit">bpm</span>
                </div>
            </div>
        </div>

        <!-- SpO2 Section -->
        <div class="metric-container">
            <div id="spo2-ring" class="progress-ring" style="--p: 0%;">
                <i class="fa-solid fa-droplet text-lg"></i>
            </div>
            <div class="flex-1">
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Nồng độ Oxy (SpO2)</div>
                <div class="value-display">
                    <span id="spo2-val">--</span><span class="unit">%</span>
                </div>
            </div>
        </div>

        <!-- Speaker Status Section (Thêm mới) -->
        <div class="metric-container">
            <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center">
                <i id="speaker-icon" class="fa-solid fa-volume-high text-indigo-400 text-lg"></i>
            </div>
            <div class="flex-1">
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Trạng thái Loa</div>
                <div class="flex gap-4 mt-1">
                    <span id="label-off" class="speaker-status state-off-active">OFF</span>
                    <span id="label-on" class="speaker-status state-inactive">ON</span>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-4 pt-4 border-t border-slate-100 flex justify-center">
            <span class="text-[9px] text-slate-300 font-bold uppercase tracking-[3px]">ERa IoT Health System</span>
        </div>
    </div>

    <!-- E-Ra Widget Library -->
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const eraWidget = new EraWidget();
        let configBPM = null;
        let configSpO2 = null;
        let configSpeaker = null; // Cấu hình cho Loa

        const bpmEl = document.getElementById('bpm-val');
        const spo2El = document.getElementById('spo2-val');
        const spo2Ring = document.getElementById('spo2-ring');
        
        const labelOff = document.getElementById('label-off');
        const labelOn = document.getElementById('label-on');
        const speakerIcon = document.getElementById('speaker-icon');

        eraWidget.init({
            needRealtimeConfigs: true,
            maxRealtimeConfigsCount: 3, // Tăng lên 3 để nhận thêm pin Loa
            onConfiguration: (configuration) => {
                configBPM = configuration.realtime_configs[0];
                configSpO2 = configuration.realtime_configs[1];
                configSpeaker = configuration.realtime_configs[2]; // Pin hiển thị trạng thái loa
            },
            onValues: (values) => {
                // Cập nhật nhịp tim
                if (configBPM && values[configBPM.id]) {
                    const val = values[configBPM.id].value;
                    bpmEl.innerText = Math.round(val);
                }

                // Cập nhật SpO2
                if (configSpO2 && values[configSpO2.id]) {
                    const val = values[configSpO2.id].value;
                    spo2El.innerText = Math.round(val);
                    spo2Ring.style.setProperty('--p', val + '%');
                }

                // Cập nhật hiển thị Loa (Hiển thị thuần túy)
                if (configSpeaker && values[configSpeaker.id]) {
                    const isSpeakerOn = (values[configSpeaker.id].value == 1);
                    
                    if (isSpeakerOn) {
                        // Trạng thái ON sáng lên
                        labelOn.className = "speaker-status state-on-active";
                        labelOff.className = "speaker-status state-inactive";
                        speakerIcon.className = "fa-solid fa-volume-high text-green-500 text-lg";
                    } else {
                        // Trạng thái OFF sáng lên
                        labelOn.className = "speaker-status state-inactive";
                        labelOff.className = "speaker-status state-off-active";
                        speakerIcon.className = "fa-solid fa-volume-xmark text-slate-400 text-lg";
                    }
                }
            }
        });
    </script>
</body>
</html>
