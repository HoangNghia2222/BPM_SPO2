<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Premium Health Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary-blue: #3b82f6;
            --soft-shadow: 10px 10px 20px #d1d9e6, -10px -10px 20px #ffffff;
            --inner-shadow: inset 2px 2px 5px #d1d9e6, inset -2px -2px 5px #ffffff;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
        }

        .main-container {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: var(--soft-shadow);
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.25rem;
            box-shadow: 5px 5px 15px #e2e8f0;
            border: 1px solid #f1f5f9;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 8px 8px 20px #cbd5e1;
        }

        .heart-beat {
            animation: heart-pulse 1.2s infinite;
            color: #ef4444;
        }

        @keyframes heart-pulse {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
        }

        .battery-track {
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.05);
        }

        .battery-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            transition: width 1s ease-in-out;
        }

        .alarm-card {
            background: #f8fafc;
            border: 2px solid transparent;
            transition: all 0.4s ease;
        }

        /* Khi có cảnh báo */
        .alarm-active {
            background: #fff1f2 !important;
            border-color: #fecaca !important;
            animation: alarm-glow 1s infinite alternate;
        }

        @keyframes alarm-glow {
            from { box-shadow: 0 0 5px rgba(239, 68, 68, 0.1); }
            to { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
        }

        .ping-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            background: #ef4444;
            opacity: 0.3;
            animation: ping 1.5s infinite;
        }

        @keyframes ping {
            75%, 100% { transform: scale(2); opacity: 0; }
        }

        .icon-box {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="main-container mx-4">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Trung Tâm Theo Dõi</h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-wider">Trạng thái thời gian thực</p>
            </div>
            <div class="icon-box bg-blue-50 text-blue-500 shadow-sm border border-blue-100">
                <i class="fas fa-stethoscope"></i>
            </div>
        </div>

        <div class="space-y-5">
            <!-- Pin Card -->
            <div class="stat-card">
                <div class="flex justify-between items-center mb-3">
                    <div class="flex items-center gap-3">
                        <div class="icon-box bg-green-50 text-green-500">
                            <i class="fas fa-battery-full"></i>
                        </div>
                        <span class="text-sm font-bold text-slate-600">Dung lượng pin</span>
                    </div>
                    <span class="text-xl font-black text-slate-800" id="battery-text">--%</span>
                </div>
                <div class="battery-track">
                    <div id="battery-fill" class="battery-fill" style="width: 0%"></div>
                </div>
            </div>

            <!-- Health Grid -->
            <div class="grid grid-cols-2 gap-4">
                <!-- Nhịp tim -->
                <div class="stat-card">
                    <div id="heart-icon-box" class="icon-box bg-red-50 text-red-500 mb-3 heart-beat">
                        <i class="fas fa-heartbeat"></i>
                    </div>
                    <p class="text-slate-500 text-[11px] font-bold uppercase tracking-wide">Nhịp tim</p>
                    <p class="text-4xl font-black text-slate-800 mt-1" id="heart-rate">-- <small class="text-xs text-slate-400 font-bold uppercase ml-1">BPM</small></p>
                </div>

                <!-- SpO2 -->
                <div class="stat-card">
                    <div class="icon-box bg-blue-50 text-blue-500 mb-3">
                        <i class="fas fa-wind"></i>
                    </div>
                    <p class="text-slate-500 text-[11px] font-bold uppercase tracking-wide">SpO2</p>
                    <p class="text-4xl font-black text-slate-800 mt-1" id="spo2-text">--<small class="text-xs text-slate-400 font-bold uppercase ml-1">%</small></p>
                </div>
            </div>

            <!-- Alarm Section -->
            <div id="alarm-panel" class="stat-card alarm-card flex items-center justify-between mt-6">
                <div class="flex items-center gap-4">
                    <div class="relative w-12 h-12 flex items-center justify-center">
                        <div id="alarm-ping" class=""></div>
                        <div id="alarm-icon-bg" class="w-12 h-12 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 border border-slate-200 transition-all duration-300">
                            <i id="alarm-icon" class="fas fa-bell-slash"></i>
                        </div>
                    </div>
                    <div>
                        <p class="text-sm font-black text-slate-700" id="alarm-status">Đang kết nối...</p>
                        <p class="text-[11px] text-slate-500 font-medium" id="alarm-msg">Đang chờ dữ liệu từ thiết bị</p>
                    </div>
                </div>
                <div id="alarm-indicator" class="w-2.5 h-2.5 rounded-full bg-slate-300"></div>
            </div>
        </div>

        <div class="mt-10 text-center">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-slate-100 border border-slate-200 shadow-inner">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Đã kết nối thiết bị</span>
            </div>
        </div>
    </div>

    <!-- E-Ra Widget Library -->
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const eraWidget = new EraWidget();
        let configBPM = null;
        let configSpO2 = null;
        let configBattery = null;

        // Elements
        const bpmVal = document.getElementById('heart-rate');
        const spo2Val = document.getElementById('spo2-text');
        const batteryText = document.getElementById('battery-text');
        const batteryFill = document.getElementById('battery-fill');
        
        const alarmPanel = document.getElementById('alarm-panel');
        const alarmStatus = document.getElementById('alarm-status');
        const alarmMsg = document.getElementById('alarm-msg');
        const alarmIcon = document.getElementById('alarm-icon');
        const alarmIconBg = document.getElementById('alarm-icon-bg');
        const alarmPing = document.getElementById('alarm-ping');
        const alarmIndicator = document.getElementById('alarm-indicator');

        eraWidget.init({
            needRealtimeConfigs: true,
            maxRealtimeConfigsCount: 3,
            onConfiguration: (configuration) => {
                configBPM = configuration.realtime_configs[0];
                configSpO2 = configuration.realtime_configs[1];
                configBattery = configuration.realtime_configs[2];
            },
            onValues: (values) => {
                let currentBPM = 0;
                let currentSpO2 = 0;

                // 1. Cập nhật Nhịp tim
                if (configBPM && values[configBPM.id]) {
                    currentBPM = Math.round(values[configBPM.id].value);
                    bpmVal.innerHTML = `${currentBPM} <small class="text-xs text-slate-400 font-bold uppercase ml-1">BPM</small>`;
                }

                // 2. Cập nhật SpO2
                if (configSpO2 && values[configSpO2.id]) {
                    currentSpO2 = Math.round(values[configSpO2.id].value);
                    spo2Val.innerHTML = `${currentSpO2}<small class="text-xs text-slate-400 font-bold uppercase ml-1">%</small>`;
                }

                // 3. Cập nhật Pin (Thay thế biến Loa cũ)
                if (configBattery && values[configBattery.id]) {
                    const batt = Math.min(100, Math.max(0, values[configBattery.id].value));
                    batteryText.innerText = `${Math.round(batt)}%`;
                    batteryFill.style.width = `${batt}%`;
                }

                // 4. Logic Cảnh báo tự động
                updateAlarmSystem(currentBPM, currentSpO2);
            }
        });

        function updateAlarmSystem(bpm, spo2) {
            // Nếu chưa có dữ liệu thì không xử lý
            if (bpm === 0 && spo2 === 0) return;

            let isDanger = false;
            let message = "Mọi chỉ số đều bình thường";

            if (spo2 > 0 && spo2 < 94) {
                isDanger = true;
                message = "Nồng độ Oxy thấp (Dưới 94%)";
            } else if (bpm > 110) {
                isDanger = true;
                message = "Nhịp tim cao bất thường";
            } else if (bpm > 0 && bpm < 50) {
                isDanger = true;
                message = "Nhịp tim quá thấp";
            }

            if (isDanger) {
                alarmPanel.classList.add('alarm-active');
                alarmStatus.innerText = "CẢNH BÁO NGUY HIỂM";
                alarmStatus.classList.replace('text-slate-700', 'text-red-600');
                alarmMsg.innerText = message;
                alarmIcon.className = "fas fa-bell animate-bounce";
                alarmIconBg.className = "w-12 h-12 rounded-xl bg-red-100 flex items-center justify-center text-red-500 border border-red-200";
                alarmPing.className = "ping-effect";
                alarmIndicator.className = "w-2.5 h-2.5 rounded-full bg-red-500";
            } else {
                alarmPanel.classList.remove('alarm-active');
                alarmStatus.innerText = "Hệ thống ổn định";
                alarmStatus.classList.replace('text-red-600', 'text-slate-700');
                alarmMsg.innerText = "Mọi chỉ số đều bình thường";
                alarmIcon.className = "fas fa-bell-slash";
                alarmIconBg.className = "w-12 h-12 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 border border-slate-200";
                alarmPing.className = "";
                alarmIndicator.className = "w-2.5 h-2.5 rounded-full bg-green-500";
            }
        }
    </script>
</body>
</html>
